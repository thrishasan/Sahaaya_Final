<!DOCTYPE html>
<html>
<head>
<title>Sahaaya Provider Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#f5f1ea,#e6d8c3);
    margin: 0;
    color: #333;
}

.hero {
    text-align: center;
    padding: 50px 20px 30px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    margin-bottom: 10px;
}

.hero p {
    color: #666;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 25px;
}

input, select {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 15px;
    flex: 1;
    min-width: 200px;
}

.stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 25px;
}

.stat-card {
    flex: 1;
    min-width: 200px;
    background: white;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.stat-card h3 {
    margin: 0;
    color: #8c6b3c;
}

.card {
    background: white;
    padding: 25px;
    margin-bottom: 18px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
}

.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

.badge {
    padding: 5px 12px;
    border-radius: 20px;
    color: white;
    font-size: 12px;
    font-weight: 500;
}

.verified {
    background: #2e7d32;
}

.pending {
    background: orange;
}

.actions {
    margin-top: 15px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

.call-btn {
    background: #2e7d32;
    color: white;
}

.verify-btn {
    background: #b08b57;
    color: white;
}

.reject-btn {
    background: crimson;
    color: white;
}

.empty {
    text-align: center;
    color: #666;
    margin-top: 40px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Sahaaya Provider Dashboard</h1>
    <p>Manage registered healthcare professionals and institutions</p>
</div>

<div class="container">

    <div class="stats">
        <div class="stat-card">
            <h3 id="totalProviders">0</h3>
            <p>Total Providers</p>
        </div>

        <div class="stat-card">
            <h3 id="verifiedProviders">0</h3>
            <p>Verified Providers</p>
        </div>

        <div class="stat-card">
            <h3 id="pendingProviders">0</h3>
            <p>Pending Verification</p>
        </div>
    </div>

    <div class="controls">
        <input 
            type="text" 
            placeholder="Search by name, specialty, location..." 
            onkeyup="filterDoctors(this.value)"
        >

        <select onchange="filterType(this.value)">
            <option value="">All Types</option>
            <option value="Doctor">Doctor</option>
            <option value="Hospital">Hospital</option>
            <option value="Clinic">Clinic</option>
            <option value="Home Care Service">Home Care</option>
            <option value="Pharmacy">Pharmacy</option>
        </select>
    </div>

    <div id="list"></div>
    <div id="empty" class="empty"></div>

</div>

<script>
let allDoctors = JSON.parse(localStorage.getItem("doctors")) || [];
let doctors = JSON.parse(localStorage.getItem("doctors")) || [];
let filteredDoctors = [...doctors];

function updateStats() {
    document.getElementById("totalProviders").innerText = doctors.length;
    document.getElementById("verifiedProviders").innerText =
        doctors.filter(d => d.status === "Verified").length;
    document.getElementById("pendingProviders").innerText =
        doctors.filter(d => d.status === "Pending").length;
}

function renderDoctors(data) {
    let container = document.getElementById("list");
    let empty = document.getElementById("empty");

    container.innerHTML = "";

    if (data.length === 0) {
        empty.innerText = "No providers found.";
        return;
    }

    empty.innerText = "";

    data.forEach((d, index) => {
        container.innerHTML += `
            <div class="card">
                <div class="top-row">
                    <h2>${d.name}</h2>
                    <span class="badge ${d.status.toLowerCase()}">
                        ${d.status === "Verified" ? "✔ Verified" : "⏳ Pending"}
                    </span>
                </div>

                <p><strong>Type:</strong> ${d.type}</p>
                <p><strong>Specialization:</strong> ${d.specialization}</p>
                <p><strong>Experience:</strong> ${d.experience}</p>
                <p><strong>Location:</strong> ${d.location}</p>
                <p><strong>Phone:</strong> ${d.phone}</p>
                <p><strong>Fee:</strong> ₹${d.fee || "0"}</p>
                <p><strong>Email:</strong> ${d.email || "N/A"}</p>
                <p><strong>Registered:</strong> ${d.registeredAt || "N/A"}</p>
                <p><strong>Rating:</strong> ⭐ ${d.rating || "New"}</p>
                <p><strong>License:</strong> 
    <button onclick="viewLicense('${d.license}')">
        View Document
    </button>
</p>

                <div class="actions">
                    <button class="call-btn" onclick="callProvider('${d.phone}')">📞 Call</button>

                    ${
                        d.status === "Pending"
                        ? `<button class="verify-btn" onclick="verifyDoctor(${index})">✔ Verify</button>
                           <button class="reject-btn" onclick="rejectDoctor(${index})">✖ Reject</button>`
                        : ""
                    }
                </div>
            </div>
        `;
    });
}

function filterDoctors(query) {
    query = query.toLowerCase();

    filteredDoctors = doctors.filter(d =>
        d.name.toLowerCase().includes(query) ||
        d.specialization.toLowerCase().includes(query) ||
        d.location.toLowerCase().includes(query)
    );

    renderDoctors(filteredDoctors);
}

function filterType(type) {
    if (!type) {
        renderDoctors(doctors);
        return;
    }

    let filtered = doctors.filter(d => d.type === type);
    renderDoctors(filtered);
}

function verifyDoctor(index) {
    doctors[index].status = "Verified";

    // Add default premium fields
    doctors[index].rating = doctors[index].rating || "4.5";
    doctors[index].fee = doctors[index].fee || "₹500";
    doctors[index].image = doctors[index].image || "https://randomuser.me/api/portraits/med/1.jpg";

    localStorage.setItem("doctors", JSON.stringify(doctors));

    alert("Provider verified successfully!");

    updateStats();
    renderDoctors(doctors);
}

function rejectDoctor(index) {
    if (confirm("Are you sure you want to reject this provider?")) {
        doctors.splice(index, 1);
        localStorage.setItem("doctors", JSON.stringify(doctors));
        updateStats();
        renderDoctors(doctors);
    }
}

function callProvider(phone) {
    alert("Calling " + phone);
}
function viewLicense(file) {

    const win = window.open("");

    win.document.write(`
        <html>
        <head>
            <title>Document Viewer</title>
        </head>
        <body style="margin:0; background:#000; display:flex; justify-content:center; align-items:center;">

            <embed 
                src="${file}" 
                type="application/pdf"
                width="100%" 
                height="100%"
            />

        </body>
        </html>
    `);
}
updateStats();
renderDoctors(doctors);
</script>

</body>
</html>
