<!DOCTYPE html>
<html>
<head>
<title>Register Provider</title>
</head>

<body>

<h2>Join as Healthcare Provider</h2>

<input id="name" placeholder="Name"><br><br>
<input id="type" placeholder="Doctor / Hospital / Clinic"><br><br>
<input id="specialization" placeholder="Specialization"><br><br>
<input id="experience" placeholder="Experience"><br><br>
<input id="location" placeholder="Location"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="email" placeholder="Email"><br><br>

<button onclick="register()">Register</button>

<script>

function register() {

    let doctors = JSON.parse(localStorage.getItem("doctors")) || [];

    let newDoctor = {
        name: document.getElementById("name").value,
        type: document.getElementById("type").value,
        specialization: document.getElementById("specialization").value,
        experience: document.getElementById("experience").value,
        location: document.getElementById("location").value,
        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        status: "Pending",
        rating: "0",
        fee: "N/A",
        image: "https://randomuser.me/api/portraits/lego/1.jpg",
        registeredAt: new Date().toLocaleDateString()
    };

    doctors.push(newDoctor);

    localStorage.setItem("doctors", JSON.stringify(doctors));

    alert("Registration submitted! Waiting for admin approval.");

    window.location.reload();
}

</script>

</body>
</html>
